<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopHub</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🛍️ ShopHub</h1>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products...">
                    <button id="searchBtn">🔍</button>
                </div>
                <div class="cart-icon-container">
                    <a href="orders.html" class="cart-icon" title="My Orders">
                        📦
                    </a>
                    <a href="../index.html" class="cart-icon" title="Shopping Cart">
                        🛒 <span id="cartCount" class="cart-count">0</span>
                    </a>
                    <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <main class="cart-container">
        <div class="container">
            <h2>Shopping Cart</h2>
            
            <div class="cart-layout">
                <!-- Cart Items -->
                <section class="cart-items">
                    <div id="cartContent">
                        <!-- Cart items will be loaded here -->
                    </div>
                </section>

                <!-- Cart Summary -->
                <aside class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="summary-item">
                        <span>Shipping:</span>
                        <span id="shipping">₹0.00</span>
                    </div>
                    <div class="summary-item discount-item" id="discountSection" style="display: none;">
                        <span>Discount:</span>
                        <span id="discount">-₹0.00</span>
                    </div>
                    <div class="summary-total">
                        <span>Total Amount:</span>
                        <span id="total">₹0.00</span>
                    </div>
                    <a href="checkout.html" class="checkout-btn" id="checkoutBtn">Proceed to Checkout</a>
                    <a href="../index.html" class="continue-shopping-btn">Continue Shopping</a>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 ShopHub. All rights reserved. | Made with ❤️</p>
    </footer>

    <script src="../js/theme.js"></script>
    <script src="../js/product-data.js"></script>
    <script src="../js/cart-manager.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
