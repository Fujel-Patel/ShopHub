<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - ShopHub</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/orders.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🛍️ ShopHub</h1>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products...">
                    <button id="searchBtn">🔍</button>
                </div>
                <div class="cart-icon-container">
                    <a href="../index.html" class="cart-icon" title="Home">
                        🏠 <span style="display: none;"></span>
                    </a>
                    <a href="cart.html" class="cart-icon" title="Shopping Cart">
                        🛒 <span id="cartCount" class="cart-count">0</span>
                    </a>
                    <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <main class="orders-container">
        <div class="container">
            <div class="orders-header">
                <h2>My Orders</h2>
                <a href="../index.html" class="back-to-store">← Back to Store</a>
            </div>

            <div id="ordersContent">
                <!-- Orders will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Order Details Modal -->
    <div id="orderDetailsModal" class="modal" style="display: none;">
        <div class="modal-content order-modal">
            <div class="modal-header">
                <h3>Order Details</h3>
                <button class="modal-close" onclick="closeOrderDetailsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="order-details-content" id="orderDetailsContent">
                    <!-- Order details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Track Order Modal -->
    <div id="trackOrderModal" class="modal" style="display: none;">
        <div class="modal-content track-modal">
            <div class="modal-header">
                <h3>📍 Order Tracking</h3>
                <button class="modal-close" onclick="closeTrackOrderModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tracking-content" id="trackingContent">
                    <!-- Tracking details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 ShopHub. All rights reserved. | Made with ❤️</p>
    </footer>

    <script src="../js/theme.js"></script>
    <script src="../js/product-data.js"></script>
    <script src="../js/cart-manager.js"></script>
    <script src="../js/orders-manager.js"></script>
    <script src="../js/orders.js"></script>
</body>
</html>
